<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 175" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Classic Pinball">
  <defs>
    <!-- Yellow glow for main text -->
    <filter id="cp-glow-y" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"   result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Cyan glow for sub-text and decorations -->
    <filter id="cp-glow-c" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Chrome gradient for letter fill -->
    <linearGradient id="cp-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#ffff88"/>
      <stop offset="55%"  stop-color="#ffee00"/>
      <stop offset="80%"  stop-color="#cc9900"/>
      <stop offset="100%" stop-color="#ffee00"/>
    </linearGradient>
    <!-- Orange accent gradient for "PINBALL" -->
    <linearGradient id="cp-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#ffaa44"/>
      <stop offset="60%"  stop-color="#ff5500"/>
      <stop offset="100%" stop-color="#cc3300"/>
    </linearGradient>
    <!-- Ball chrome gradient -->
    <radialGradient id="cp-ball" cx="38%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#aaddff"/>
      <stop offset="100%" stop-color="#004466"/>
    </radialGradient>
    <!-- Bumper gradient -->
    <radialGradient id="cp-bump" cx="40%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#00ffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#004444"/>
    </radialGradient>
  </defs>

  <!-- Background panel -->
  <rect x="4" y="4" width="512" height="167" rx="10" ry="10" fill="#0a0a0a" stroke="#00ffff" stroke-width="2" opacity="0.6"/>

  <!-- Decorative corner star — top-left -->
  <g transform="translate(28,28)" filter="url(#cp-glow-c)">
    <polygon points="0,-9 2,-3 8,-3 3,1 5,8 0,4 -5,8 -3,1 -8,-3 -2,-3" fill="#00ffff" opacity="0.9"/>
  </g>
  <!-- Decorative corner star — top-right -->
  <g transform="translate(492,28)" filter="url(#cp-glow-c)">
    <polygon points="0,-9 2,-3 8,-3 3,1 5,8 0,4 -5,8 -3,1 -8,-3 -2,-3" fill="#00ffff" opacity="0.9"/>
  </g>
  <!-- Decorative corner star — bottom-left -->
  <g transform="translate(28,148)" filter="url(#cp-glow-c)">
    <polygon points="0,-9 2,-3 8,-3 3,1 5,8 0,4 -5,8 -3,1 -8,-3 -2,-3" fill="#00ffff" opacity="0.7"/>
  </g>
  <!-- Decorative corner star — bottom-right -->
  <g transform="translate(492,148)" filter="url(#cp-glow-c)">
    <polygon points="0,-9 2,-3 8,-3 3,1 5,8 0,4 -5,8 -3,1 -8,-3 -2,-3" fill="#00ffff" opacity="0.7"/>
  </g>

  <!-- Left flipper decoration -->
  <g filter="url(#cp-glow-c)">
    <line x1="18" y1="130" x2="58" y2="118" stroke="#00ffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <circle cx="18" cy="130" r="5" fill="#00ffff" opacity="0.9"/>
  </g>
  <!-- Right flipper decoration (mirrored) -->
  <g filter="url(#cp-glow-c)">
    <line x1="502" y1="130" x2="462" y2="118" stroke="#00ffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <circle cx="502" cy="130" r="5" fill="#00ffff" opacity="0.9"/>
  </g>

  <!-- Bumper circles — left cluster -->
  <circle cx="52" cy="68" r="10" fill="url(#cp-bump)" filter="url(#cp-glow-c)" opacity="0.8"/>
  <circle cx="52" cy="68" r="10" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="68" cy="55" r="8"  fill="url(#cp-bump)" filter="url(#cp-glow-c)" opacity="0.7"/>

  <!-- Bumper circles — right cluster -->
  <circle cx="468" cy="68" r="10" fill="url(#cp-bump)" filter="url(#cp-glow-c)" opacity="0.8"/>
  <circle cx="468" cy="68" r="10" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="452" cy="55" r="8"  fill="url(#cp-bump)" filter="url(#cp-glow-c)" opacity="0.7"/>

  <!-- Ball in centre-top -->
  <circle cx="260" cy="22" r="11" fill="url(#cp-ball)" filter="url(#cp-glow-c)" opacity="0.95"/>
  <circle cx="260" cy="22" r="11" fill="none" stroke="#aaddff" stroke-width="1" opacity="0.7"/>

  <!-- "CLASSIC" — top line -->
  <text x="260" y="82"
        font-family="'VT323', monospace"
        font-size="62"
        text-anchor="middle"
        letter-spacing="6"
        fill="url(#cp-chrome)"
        filter="url(#cp-glow-y)"
        paint-order="stroke"
        stroke="#000" stroke-width="2">CLASSIC</text>

  <!-- "PINBALL" — bottom line, orange accent -->
  <text x="260" y="148"
        font-family="'VT323', monospace"
        font-size="72"
        text-anchor="middle"
        letter-spacing="8"
        fill="url(#cp-orange)"
        filter="url(#cp-glow-y)"
        paint-order="stroke"
        stroke="#000" stroke-width="2">PINBALL</text>

</svg>
