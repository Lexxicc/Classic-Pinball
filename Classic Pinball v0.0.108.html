<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Classic Pinball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: monospace;
    overflow-x: hidden;
    /* safe-area padding so nothing is clipped by notch / home bar */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  #hud {
    color: #ff0;
    font-size: clamp(12px, 4vw, 18px);
    letter-spacing: clamp(1px, 0.5vw, 2px);
    margin-bottom: 6px;
    display: flex;
    gap: clamp(12px, 5vw, 40px);
    width: 100%;
    max-width: 400px;
    justify-content: space-around;
    padding: 0 4px;
  }
  #hud span { text-shadow: 0 0 8px #ff0; white-space: nowrap; }

  canvas {
    border: 3px solid #444;
    display: block;
    /* Scale canvas down to fit the viewport width, never exceed natural size */
    width: min(400px, 100vw - 6px);        /* 6px = 2×3px border */
    height: auto;
    /* Also cap height so it fits the screen vertically */
    max-height: calc(100dvh - 116px);      /* HUD ~32px + msg ~32px + footer ~22px + padding ~30px */
    object-fit: contain;
    touch-action: none;                    /* prevent scroll hijack on canvas */
  }

  #msg {
    color: #ff0;
    font-size: clamp(14px, 4.5vw, 22px);
    letter-spacing: clamp(1px, 0.8vw, 3px);
    margin-top: 8px;
    min-height: 24px;
    text-shadow: 0 0 10px #ff0;
    text-align: center;
    padding: 0 8px;
    width: 100%;
    max-width: 400px;
  }

  /* Landscape: constrain height, let canvas shrink to fit */
  @media (orientation: landscape) and (max-height: 500px) {
    body { justify-content: flex-start; padding-top: max(4px, env(safe-area-inset-top)); }
    #hud { margin-bottom: 2px; font-size: clamp(10px, 2vh, 14px); gap: clamp(8px, 3vw, 20px); }
    canvas { max-height: calc(100dvh - 72px); }
    #msg { font-size: clamp(11px, 2.5vh, 16px); margin-top: 2px; min-height: 18px; }
  }

  /* Canvas wrapper — needed to position tap-hint overlays */
  #canvas-wrap {
    position: relative;
    display: inline-block;
    line-height: 0; /* collapse gap under canvas */
  }

  /* Tap-zone hint badges — only visible on touch devices */
  .tap-hint {
    display: none;
    position: absolute;
    bottom: 12px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(0,255,255,0.15);
    border: 2px solid rgba(0,255,255,0.5);
    color: #0ff;
    font-family: monospace;
    font-size: 10px;
    font-weight: bold;
    align-items: center;
    justify-content: center;
    text-align: center;
    pointer-events: none; /* touches pass through to canvas */
    -webkit-user-select: none;
    user-select: none;
  }
  .tap-hint.left  { left: 8px; }
  .tap-hint.right { right: 8px; }

  @media (hover: none) and (pointer: coarse) {
    .tap-hint { display: flex; }
  }

        :root {
            --color-bg-dark:  #000000;
            --color-panel:    #111111;
            --color-primary:  #00ffff;
            --color-accent:   #ff5500;
            --color-glow:     #ffff00;
            --color-shadow:   #001a1a;
        }
        .hidden { display: none !important; }
        .btn-pixel { padding: 4px 12px; text-transform: uppercase; font-weight: bold; border: 4px solid var(--color-primary); background: var(--color-panel); box-shadow: inset -2px -2px 0px var(--color-shadow); cursor: pointer; }
        .btn-pixel:hover { background: var(--color-primary); color: var(--color-bg-dark); }
        .menu-scroll { background: linear-gradient(180deg, var(--color-bg-dark) 0%, var(--color-panel) 45%, var(--color-panel) 55%, var(--color-bg-dark) 100%); border: 6px solid var(--color-primary); box-shadow: 0 0 6px 2px color-mix(in srgb, var(--color-primary) 55%, transparent), 0 0 28px 4px color-mix(in srgb, var(--color-primary) 28%, transparent), 0 0 70px color-mix(in srgb, var(--color-primary) 12%, transparent), inset 0 0 40px rgba(0,0,0,0.45); width: 640px; max-width: 92vw; max-height: 92vh; overflow-y: auto; scrollbar-width: none; }
        .menu-scroll::-webkit-scrollbar { display: none; }
        .start-menu-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 24px; font-family: 'VT323', monospace; font-size: 1.45rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-glow); background: transparent; border: none; border-bottom: 2px solid var(--color-shadow); cursor: pointer; text-shadow: 2px 2px 0 var(--color-shadow); text-align: left; transition: background 0.12s, padding-left 0.12s; }
        .start-menu-btn:hover { background: color-mix(in srgb, var(--color-primary) 10%, transparent); color: #fff; padding-left: 28px; }
        .start-menu-btn:last-child { border-bottom: none; }
        .start-back-btn { font-family: 'VT323', monospace; font-size: 1.1rem; text-transform: uppercase; padding: 6px 14px; color: var(--color-primary); background: transparent; border: 4px solid var(--color-primary); cursor: pointer; letter-spacing: 0.05em; }
        .start-back-btn:hover { background: var(--color-primary); color: var(--color-bg-dark); }
        .subpanel-header { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--color-bg-dark); position: sticky; top: 0; z-index: 10; border-bottom: 6px solid var(--color-primary); }
        .subpanel-header h2 { font-size: 1.5rem; color: var(--color-glow); font-weight: bold; text-transform: uppercase; font-style: italic; }
        .subpanel-footer { position: sticky; bottom: 0; height: 6px; background: var(--color-bg-dark); }
</style>
</head>
<body>
    <div id="start-overlay" class="fixed inset-0 z-[200] flex items-center justify-center" style="background:#000;">
        <div id="start-main" class="menu-scroll relative z-10">
            <div class="text-center pt-4 pb-4 px-6" style="border-bottom: 4px solid var(--color-shadow);">
                <div style="min-height:180px; display:flex; align-items:center; justify-content:center;"><h1 style="font-family:'VT323',monospace; font-size:clamp(2.5rem,10vw,5rem); color:var(--color-glow); text-shadow:3px 3px 0 var(--color-shadow); text-transform:uppercase; letter-spacing:0.12em; line-height:1.1;">CLASSIC PINBALL</h1></div>
                <div class="flex items-center justify-center gap-3 mt-2"><div class="flex-grow h-px" style="background:linear-gradient(to right,transparent,var(--color-primary))"></div><span style="font-size:1rem; color:var(--color-primary); text-transform:uppercase; letter-spacing:0.4em;">KEEP THE BALL ALIVE</span><div class="flex-grow h-px" style="background:linear-gradient(to left,transparent,var(--color-primary))"></div></div>
            </div>
            <div class="flex flex-col">
                <button class="start-menu-btn" onclick="startGame()"><span>Play</span><span class="ml-auto text-base opacity-40 font-sans">↵</span></button>

                <button class="start-menu-btn" onclick="showStartPanel('settings')"><span>Settings</span><span class="ml-auto text-base opacity-40 font-sans">›</span></button>
            </div>
            <p style="font-size:10px; text-transform:uppercase; letter-spacing:0.35em; color:var(--color-primary); opacity:0.6; text-align:center; padding:12px 0; border-top: 1px solid var(--color-shadow);">&copy; Tacticon Studios 2026 &nbsp;&mdash;&nbsp; v0.0.108</p>
        </div>
        <div id="start-howtoplay" class="menu-scroll hidden relative z-10"><div class="subpanel-header"><button class="start-back-btn" onclick="showStartPanel('main')">← Back</button><h2>How to Play</h2></div><div class="p-5 text-[12px]"><p style="color:var(--color-primary);opacity:0.5;text-align:center;margin-top:32px">Coming soon.</p></div><div class="subpanel-footer"></div></div>
        <div id="start-highscores" class="menu-scroll hidden relative z-10"><div class="subpanel-header"><button class="start-back-btn" onclick="showStartPanel('main')">← Back</button><h2>High Scores</h2></div><div class="p-5" id="highscore-list"><p style="text-align:center;color:var(--color-primary);opacity:0.5;font-size:0.875rem;margin-top:32px">No scores recorded yet.</p></div><div class="subpanel-footer"></div></div>
        <div id="start-patchnotes" class="menu-scroll hidden relative z-10"><div class="subpanel-header"><button class="start-back-btn" onclick="showStartPanel('main')">← Back</button><h2>Patch Notes</h2></div><div id="patchnotes-list" class="p-5 text-[12px] space-y-5"></div><div class="subpanel-footer"></div></div>
        <div id="start-settings" class="menu-scroll hidden relative z-10"><div class="subpanel-header"><button class="start-back-btn" onclick="showStartPanel('main')">← Back</button><h2>Settings</h2></div><div class="p-6"><p style="color:var(--color-primary);opacity:0.5;text-align:center;font-size:0.875rem;margin-top:32px">No settings available yet.</p></div><div class="subpanel-footer"></div></div>
    </div>

<div id="game-container" class="hidden w-full h-full flex flex-col items-center">
<div id="hud">
  <span>SCORE: <span id="score">0</span></span>
  <span>BEST: <span id="best">0</span></span>
  <span>BALLS: <span id="balls">5</span></span>
  <span>MULT: <span id="mult">x1.0</span></span>
</div>
<div id="canvas-wrap">
  <canvas id="c" width="400" height="700"></canvas>
  <div class="tap-hint left">L</div>
  <div class="tap-hint right">R</div>
</div>
<div id="msg">PRESS SPACE TO LAUNCH</div>
<p id="game-footer" style="font-size:10px;text-align:center;opacity:0.4;padding:8px;letter-spacing:0.3em;text-transform:uppercase;">&copy; Tacticon Studios 2026 &mdash; v0.0.108</p>
</div>

<script>
    (function(){ var _k='cp_wipe_v108'; if(localStorage.getItem(_k)!=='1'){ localStorage.removeItem('classicpinball_hs'); localStorage.removeItem('cpb_best'); localStorage.setItem(_k,'1'); } })();
    const PATCH_NOTES = [
      { v: 'v0.0.108', date: '2026-05-02', notes: [
        'saveScore() now called on every game-over path (keyboard and touch)',
        'Removed non-functional audio controls from Settings to avoid misleading stubs',
        'Added ball speed cap to prevent tunneling through paddles and bumpers at high speed',
        'popstate handler now always cancels the animation loop regardless of which panel is visible',
        'Touch restart now shows ready state first; ball launches only on second tap, matching keyboard behaviour',
        'Consolidated best-score storage — both leaderboard and HUD best now share the classicpinball_hs key',
        'initGame() and addScore() now read best score from classicpinball_hs instead of the removed cpb_best key',
        'Keyboard restart (Space on game-over) now records score before wiping state',
        'Touch restart now records score before wiping state',
        'rafId is always set to null after cancellation to prevent stale handle re-use',
        'Fixed duplicate game loop: rafId is cancelled in initGame() before starting a new loop',
        'Bumper active flag is fully reset in resetBumpers() to guarantee clean per-ball state'
      ]}
    ];
    const HS_KEY = 'classicpinball_hs';
    function getBestFromScores() { const s = getScores(); return s.length ? s[0].score : 0; }
    function saveScore(scoreVal, label='') { const scores = getScores(); scores.push({ score: scoreVal, label, date: new Date().toLocaleDateString() }); scores.sort((a,b)=>b.score-a.score); scores.splice(10); try { localStorage.setItem(HS_KEY, JSON.stringify(scores)); } catch(e) {} }
    function getScores() { try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch { return []; } }
    function renderHighScores() { const el = document.getElementById('highscore-list'); const scores = getScores(); const primary = getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim(); const glow = getComputedStyle(document.documentElement).getPropertyValue('--color-glow').trim(); const shadow = getComputedStyle(document.documentElement).getPropertyValue('--color-shadow').trim(); if (!scores.length) { el.innerHTML = `<p style="text-align:center;color:${primary};opacity:0.5;font-size:0.875rem;margin-top:32px">No scores recorded yet.</p>`; return; } el.innerHTML = scores.map((s,i) => `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid ${shadow};font-size:0.875rem"><span style="color:${primary};width:24px;text-align:right">${i+1}.</span><span style="flex:1;color:#fff">${s.label||'—'}</span><span style="color:${glow};font-weight:bold">${s.score}</span><span style="color:${primary};opacity:0.5;font-size:0.75rem">${s.date}</span></div>`).join(''); }
    function renderPatchNotes() { const el = document.getElementById('patchnotes-list'); const primary = getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim(); const glow = getComputedStyle(document.documentElement).getPropertyValue('--color-glow').trim(); if (!PATCH_NOTES.length) { el.innerHTML = `<p style="text-align:center;color:${primary};opacity:0.5;font-size:0.875rem;margin-top:32px">No patch notes yet.</p>`; return; } el.innerHTML = PATCH_NOTES.map(p => `<div><div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px"><span style="color:${glow};font-weight:bold">${p.v}</span><span style="color:${primary};opacity:0.6;font-size:10px">${p.date}</span></div><ul style="margin:0;padding:0;list-style:none">${p.notes.map(n=>`<li style="color:#d1d5db">• ${n}</li>`).join('')}</ul></div>`).join(''); }
    const PANELS = ['main','howtoplay','settings','highscores','patchnotes'];
    function showStartPanel(name, fromPopstate=false) { PANELS.forEach(p => { const el = document.getElementById('start-'+p); if (el) el.classList.toggle('hidden', p !== name); }); if (name === 'highscores') renderHighScores(); if (name === 'patchnotes') renderPatchNotes(); if (!fromPopstate && name !== 'main') history.pushState({ panel: name }, ''); }
    window.addEventListener('popstate', function(e) {
        const ov = document.getElementById('start-overlay');
        const gc = document.getElementById('game-container');
        // Always stop the game loop when navigating back, regardless of which panel is visible
        if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
        if (!ov) return;
        if (!ov.classList.contains('hidden')) {
            showStartPanel('main', true);
        } else if (gc && !gc.classList.contains('hidden')) {
            gc.classList.add('hidden');
            ov.classList.remove('hidden');
            showStartPanel('main', true);
            gameOver = true;
        }
    });
    function startGame() { history.pushState({ panel: 'game' }, ''); document.getElementById('start-overlay').classList.add('hidden'); document.getElementById('game-container').classList.remove('hidden'); initGame(); }

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const ballsEl = document.getElementById('balls');
const multEl  = document.getElementById('mult');
const msgEl   = document.getElementById('msg');

let score = 0;
let best = getBestFromScores();
let ballsLeft = 5;
let gameOver = false;
// Bug fix 1: track the rAF handle so we can cancel before restarting the loop
let rafId = null;

// Skill-based scoring state
// rallyMult: survival multiplier — grows as the ball stays alive longer
// rallyFrames: frame counter for the current ball's survival time
// allBumpersCleared: flag to award the all-bumpers-cleared bonus once per ball
let rallyMult   = 1.0;
let rallyFrames = 0;
let allBumpersCleared = false;

// Ball
const ball = {
  x: W / 2, y: H - 120,
  vx: 0, vy: 0,
  r: 9,
  active: false,
  topLaneFired: false
};

// Flippers
const flippers = {
  left:  { x: 100, y: H - 60, angle: 0.5,  pressed: false },
  right: { x: 300, y: H - 60, angle: Math.PI - 0.5, pressed: false }
};
const FL = 60; // flipper length

// Bumpers
// hits: total times this bumper has been struck by the current ball (resets per ball)
const bumpers = [
  { x: 120, y: 200, r: 22, lit: 0, active: false, hits: 0 },
  { x: 280, y: 200, r: 22, lit: 0, active: false, hits: 0 },
  { x: 200, y: 150, r: 22, lit: 0, active: false, hits: 0 },
  { x: 150, y: 300, r: 18, lit: 0, active: false, hits: 0 },
  { x: 250, y: 300, r: 18, lit: 0, active: false, hits: 0 },
];

// Walls (slingshots) — as line segments the ball bounces off
const walls = [
  // left gutter guide
  { x1: 60,  y1: H - 140, x2: 60,  y2: H - 60 },
  // right gutter guide
  { x1: 340, y1: H - 140, x2: 340, y2: H - 60 },
];

// Bug fix 2: reset bumper state and topLaneFired when resetting the game state
function resetBumpers() {
  bumpers.forEach(b => { b.active = false; b.lit = 0; b.hits = 0; });
}

function resetBall() {
  ball.x = W / 2;
  ball.y = H - 120;
  ball.vx = 0;
  ball.vy = 0;
  ball.active = false;
  // Bug fix 3: always clear topLaneFired on ball reset so a new ball can score the top lane
  ball.topLaneFired = false;
  // Reset per-ball skill tracking
  rallyMult        = 1.0;
  rallyFrames      = 0;
  allBumpersCleared = false;
  multEl.textContent = 'x1.0';
  bumpers.forEach(b => { b.hits = 0; b.active = false; });
  msgEl.textContent = 'PRESS SPACE TO LAUNCH';
}

function launchBall() {
  if (ball.active || gameOver) return;
  // Deterministic straight-up launch — removes luck from initial trajectory
  ball.vy = -14;
  ball.vx = 0;
  ball.active = true;
  msgEl.textContent = '';
}

function addScore(pts) {
  // Apply the rally (survival) multiplier; round to nearest integer
  score += Math.round(pts * rallyMult);
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    bestEl.textContent = best;
  }
}

// Flipper geometry helpers
function flipperTip(f) {
  return {
    x: f.x + Math.cos(f.angle) * FL,
    y: f.y + Math.sin(f.angle) * FL
  };
}

function closestPointOnSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return { x: ax, y: ay, t: 0 };
  let t = ((px - ax) * dx + (py - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return { x: ax + t * dx, y: ay + t * dy, t };
}

function collideFlipper(f) {
  const tip = flipperTip(f);
  const cp = closestPointOnSegment(ball.x, ball.y, f.x, f.y, tip.x, tip.y);
  const dx = ball.x - cp.x, dy = ball.y - cp.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist === 0) return;
  if (dist < ball.r + 6) {
    const nx = dx / dist, ny = dy / dist;
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    // boost on flipper press
    const boost = f.pressed ? 1.4 : 1.0;
    const launch = Math.max(speed, 10) * boost;
    ball.vx = nx * launch;
    ball.vy = ny * launch;
    // push out — clearance must match the collision threshold (ball.r + 6) to prevent re-entry next frame
    ball.x = cp.x + nx * (ball.r + 6);
    ball.y = cp.y + ny * (ball.r + 6);
  }
}

function collideWall(w) {
  const cp = closestPointOnSegment(ball.x, ball.y, w.x1, w.y1, w.x2, w.y2);
  const dx = ball.x - cp.x, dy = ball.y - cp.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist === 0 || dist >= ball.r + 3) return;
  const nx = dx / dist, ny = dy / dist;
  // Reflect velocity about the wall normal
  const dot = ball.vx * nx + ball.vy * ny;
  ball.vx -= 2 * dot * nx * 0.85;
  ball.vy -= 2 * dot * ny * 0.85;
  // Push out so the ball sits just outside the wall
  ball.x = cp.x + nx * (ball.r + 3);
  ball.y = cp.y + ny * (ball.r + 3);
}

function collideBumper(b) {
  const dx = ball.x - b.x, dy = ball.y - b.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < ball.r + b.r) {
    if (!b.active) {
      // First hit on this bumper this visit: 100 pts; repeat hits: 50 pts
      const pts = b.hits === 0 ? 100 : 50;
      addScore(pts);
      b.hits++;
      b.lit = 15;
      b.active = true;
      // Check if all bumpers have been struck at least once this ball
      if (!allBumpersCleared && bumpers.every(bmp => bmp.hits > 0)) {
        allBumpersCleared = true;
        addScore(1000); // all-bumpers bonus
      }
    }
    const nx = dx / dist, ny = dy / dist;
    const speed = Math.max(Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy), 8) * 1.1;
    ball.vx = nx * speed;
    ball.vy = ny * speed;
    ball.x = b.x + nx * (ball.r + b.r + 1);
    ball.y = b.y + ny * (ball.r + b.r + 1);
  } else {
    b.active = false;
  }
}

function update() {
  if (!ball.active) return;

  // Rally (survival) multiplier: increases by 0.25x every ~10 seconds (600 frames at 60 fps), capped at 3x
  rallyFrames++;
  const nextMult = Math.min(3.0, 1.0 + Math.floor(rallyFrames / 600) * 0.25);
  if (nextMult !== rallyMult) {
    rallyMult = nextMult;
    multEl.textContent = 'x' + rallyMult.toFixed(1);
  }

  // Gravity
  ball.vy += 0.35;

  // Drag
  ball.vx *= 0.999;

  // Speed cap — prevents tunneling through paddles and bumpers at very high velocity
  const MAX_SPEED = 22;
  const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
  if (spd > MAX_SPEED) { const s = MAX_SPEED / spd; ball.vx *= s; ball.vy *= s; }

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Side walls
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx) * 0.85; }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx) * 0.85; }

  // Top wall
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy) * 0.85; }

  // Bumpers
  bumpers.forEach(b => { if (b.lit > 0) b.lit--; collideBumper(b); });

  // Gutter-guide walls (slingshots)
  walls.forEach(collideWall);

  // Flippers
  collideFlipper(flippers.left);
  collideFlipper(flippers.right);

  // Lost ball
  if (ball.y > H + 20) {
    ballsLeft--;
    ballsEl.textContent = ballsLeft;
    if (ballsLeft <= 0) {
      gameOver = true;
      saveScore(score);
      best = getBestFromScores();
      bestEl.textContent = best;
      msgEl.textContent = 'GAME OVER — SPACE TO RESTART';
    } else {
      resetBall();
    }
  }

  // Bonus: top lane — once per ball, rewards deliberate skill shot to the top
  if (ball.y < 30 && ball.vy < 0) {
    if (!ball.topLaneFired) { addScore(750); ball.topLaneFired = true; }
  }
}

function drawBall() {
  ctx.save();
  const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 1, ball.x, ball.y, ball.r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(1, '#aaa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawFlipper(f) {
  const tip = flipperTip(f);
  ctx.save();
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(f.x, f.y);
  ctx.lineTo(tip.x, tip.y);
  ctx.stroke();
  ctx.restore();
}

function drawBumper(b) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = b.lit > 0 ? '#ff0' : '#f50';
  ctx.shadowColor = b.lit > 0 ? '#ff0' : '#f80';
  ctx.shadowBlur = b.lit > 0 ? 20 : 6;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(b.hits === 0 ? '100' : '+50', b.x, b.y);
  ctx.restore();
}

function drawTable() {
  // Background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Grid pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }

  // Top lane indicator
  ctx.strokeStyle = '#f0f';
  ctx.lineWidth = 3;
  ctx.setLineDash([10, 6]);
  ctx.beginPath();
  ctx.moveTo(0, 28); ctx.lineTo(W, 28);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#f0f';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('+750', W / 2, 22);

  // Gutter guides
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(60, H - 140); ctx.lineTo(60, H - 60);
  ctx.moveTo(340, H - 140); ctx.lineTo(340, H - 60);
  ctx.stroke();

  // Drain zone
  ctx.fillStyle = 'rgba(255,0,0,0.05)';
  ctx.fillRect(0, H - 30, W, 30);
}

function drawFlipperAngles() {
  // Animate flipper angles
  const targetL = flippers.left.pressed  ? -0.3 : 0.5;
  const targetR = flippers.right.pressed ? Math.PI + 0.3 : Math.PI - 0.5;
  flippers.left.angle  += (targetL - flippers.left.angle)  * 0.35;
  flippers.right.angle += (targetR - flippers.right.angle) * 0.35;
}

function draw() {
  drawTable();
  bumpers.forEach(drawBumper);
  drawFlipper(flippers.left);
  drawFlipper(flippers.right);
  if (ball.active) drawBall();
}

function loop() {
  drawFlipperAngles();
  update();
  draw();
  // Bug fix 4: store the rAF id so it can be cancelled before a new loop is started
  rafId = requestAnimationFrame(loop);
}

// Controls
document.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft'  || e.code === 'KeyZ') flippers.left.pressed  = true;
  if (e.code === 'ArrowRight' || e.code === 'KeySlash') flippers.right.pressed = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameOver) {
      // Score was already recorded in update() when the last ball was lost; wipe state for new game
      score = 0; scoreEl.textContent = 0;
      best = getBestFromScores(); bestEl.textContent = best;
      ballsLeft = 5; ballsEl.textContent = 5;
      gameOver = false;
      resetBumpers();
      resetBall();
    } else {
      launchBall();
    }
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft'  || e.code === 'KeyZ') flippers.left.pressed  = false;
  if (e.code === 'ArrowRight' || e.code === 'KeySlash') flippers.right.pressed = false;
});

// Touch / mobile
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  [...e.changedTouches].forEach(t => {
    const r = canvas.getBoundingClientRect();
    const cx = (t.clientX - r.left) * (W / r.width);
    if (cx < W / 2) flippers.left.pressed  = true;
    else             flippers.right.pressed = true;
    if (gameOver) {
      // Score was already recorded in update() when the last ball was lost; wipe state for new game.
      // Show the ready state first — ball launches on the next tap, consistent with keyboard behaviour.
      score = 0; scoreEl.textContent = 0;
      best = getBestFromScores(); bestEl.textContent = best;
      ballsLeft = 5; ballsEl.textContent = 5;
      gameOver = false;
      resetBumpers();
      resetBall();
    } else if (!ball.active) {
      launchBall();
    }
  });
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  [...e.changedTouches].forEach(t => {
    const r = canvas.getBoundingClientRect();
    const cx = (t.clientX - r.left) * (W / r.width);
    if (cx < W / 2) flippers.left.pressed  = false;
    else             flippers.right.pressed = false;
  });
}, { passive: false });

function initGame() {
  // Bug fix 7: cancel any existing rAF loop before starting a new one
  if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
  score = 0; scoreEl.textContent = 0;
  best = getBestFromScores();
  bestEl.textContent = best;
  ballsLeft = 5; ballsEl.textContent = 5;
  gameOver = false;
  resetBumpers();
  resetBall();
  loop();
}
</script>
</body>
</html>
